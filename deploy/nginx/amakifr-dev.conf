###############################################################################
# Nginx DEV — test mode maintenance amakifr en local
# Fichier : deploy/nginx/amakifr-dev.conf
# Installation : bash scripts/install-nginx-amakifr-dev.sh
#
# Adaptez AMAKI_ROOT si votre clone n'est pas dans /soft/dev/nextjs/amakifr
###############################################################################

upstream amakifr_dev_backend {
    server 127.0.0.1:9052;
    keepalive 16;
}

server {
    listen 8090;
    listen [::]:8090;
    server_name localhost amakifr.local;

    client_max_body_size 100M;

    access_log /var/log/nginx/amakifr-dev-access.log;
    error_log  /var/log/nginx/amakifr-dev-error.log;

    #########################################################################
    # MODE MAINTENANCE (fichier flag à la racine du projet)
    #########################################################################
    set $maintenance 0;

    if (-f /soft/dev/nextjs/amakifr/maintenance.flag) {
        set $maintenance 1;
    }

    # Décommenter pour tester la maintenance même en local :
    # if ($remote_addr ~ "^(127\.0\.0\.1)$") {
    #     set $maintenance 0;
    # }

    if ($maintenance = 1) {
        return 503;
    }

    error_page 503 @maintenance_page;

    location @maintenance_page {
        allow all;
        root /soft/dev/nextjs/amakifr/public;
        rewrite ^ /maintenance.html break;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        default_type text/html;
    }

    #########################################################################
    # Application Next.js (pm2 amakifr-dev ou npm run dev)
    #########################################################################
    location / {
        proxy_pass http://amakifr_dev_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static {
        alias /soft/dev/nextjs/amakifr/.next/static;
        expires 1h;
        access_log off;
    }

    location = /maintenance.html {
        root /soft/dev/nextjs/amakifr/public;
        add_header Cache-Control "no-store";
    }
}
